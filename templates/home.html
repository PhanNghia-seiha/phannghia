<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shop</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        h1 {
            background: #ee4d2d;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: 20px auto;
        }

        /* search */
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 12px;
            background: #ee4d2d;
            color: white;
            border: none;
            cursor: pointer;
        }

        .sort a {
            margin-left: 10px;
            color: #ee4d2d;
            font-weight: bold;
        }

        /* grid sản phẩm */
        .product-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .product-card {
            background: white;
            border-radius: 6px;
            padding: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .name {
            font-size: 14px;
            height: 40px;
            overflow: hidden;
        }

        .price {
            color: #ee4d2d;
            font-weight: bold;
            margin-top: 5px;
        }

        .btn {
            display: block;
            text-align: center;
            margin-top: 8px;
            padding: 6px;
            background: #ee4d2d;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h1>🛒 Shop Online</h1>

<div class="container">

    <div class="top-bar">
        <form action="/home/index" method="get">
            <input type="text" name="keyword" placeholder="Tìm sản phẩm...">
            <button>Tìm</button>
        </form>

        <div class="sort">
            <a href="/home/index?sort=asc">Giá ↑</a>
            <a href="/home/index?sort=desc">Giá ↓</a>
        </div>
    </div>

    <div class="product-list">
        <div class="product-card" th:each="p : ${items}">
            <img th:src="@{'/images/' + ${p.image}}" loading="lazy">

            <div class="name" th:text="${p.name}"></div>

            <div class="price"
                 th:text="${#numbers.formatCurrency(p.price)}"></div>

            <a class="btn"
               th:href="@{/product/detail/{id}(id=${p.id})}">
                Xem chi tiết
            </a>
        </div>
    </div>

</div>

</body>
</html>
