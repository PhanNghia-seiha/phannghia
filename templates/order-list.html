<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Đơn hàng của bạn</h2>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Ngày</th>
    <th></th>
  </tr>

  <tr th:each="o : ${items}">
    <td th:text="${o.id}"></td>
    <td th:text="${o.createDate}"></td>
    <td>
      <a th:href="@{/order/detail/{id}(id=${o.id})}">Xem</a>
    </td>
  </tr>
</table>
</body>
</html>
