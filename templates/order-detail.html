<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Chi tiết đơn hàng</h2>

<table border="1">
  <tr>
    <th>Sản phẩm</th>
    <th>Giá</th>
    <th>Số lượng</th>
  </tr>

  <tr th:each="item : ${items}">
    <td th:text="${item.product.name}"></td>
    <td th:text="${item.price}"></td>
    <td th:text="${item.quantity}"></td>
  </tr>
</table>
</body>
</html>
