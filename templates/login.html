<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #ee4d2d, #ff7337);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #ee4d2d;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        input:focus {
            border-color: #ee4d2d;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ee4d2d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #d84326;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
        }

        .footer a {
            color: #ee4d2d;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Đăng nhập</h2>

    <form action="/auth/login" method="post">
        <input name="username" placeholder="Tên đăng nhập">
        <input name="password" type="password" placeholder="Mật khẩu">
        <button>Đăng nhập</button>
    </form>

    <p class="error" th:text="${error}"></p>

    <div class="footer">
        Chưa có tài khoản? <a href="#">Đăng ký</a>
    </div>
</div>

</body>
</html>
